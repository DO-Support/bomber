services:
  app:
    build: .
    image: jmv-app:latest
    restart: unless-stopped
    expose:
      - "8000"            # internal only — never published to the host
    environment:
      # --- Azure SQL (encrypt on, validated cert) ---
      MSSQL_SERVER: ${MSSQL_SERVER}
      MSSQL_PORT: ${MSSQL_PORT:-1433}
      MSSQL_DATABASE: ${MSSQL_DATABASE}
      MSSQL_USERNAME: ${MSSQL_USERNAME}
      MSSQL_ENCRYPT: "yes"
      MSSQL_TRUST_SERVER_CERTIFICATE: "no"
      # --- app / session ---
      SESSION_HTTPS_ONLY: "true"
      SESSION_MAX_AGE: ${SESSION_MAX_AGE:-43200}
      CACHE_TTL: ${CACHE_TTL:-300}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-3}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # secrets below are read from files at container start (see entrypoint note)
    secrets:
      - mssql_password
      - session_secret
      - app_users
    # Load file-based secrets into the env the app expects, then exec gunicorn.
    entrypoint:
      - /bin/sh
      - -c
      - |
        export MSSQL_PASSWORD="$$(cat /run/secrets/mssql_password)"
        export SESSION_SECRET="$$(cat /run/secrets/session_secret)"
        export APP_USERS="$$(cat /run/secrets/app_users)"
        exec gunicorn jobvariance.app:app -c gunicorn_conf.py
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro        # self-signed cert + key (see scripts/)
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  internal:
    driver: bridge

secrets:
  mssql_password:
    file: ./secrets/mssql_password.txt
  session_secret:
    file: ./secrets/session_secret.txt
  app_users:
    file: ./secrets/app_users.json
